services:
  postgres:
    image: postgres:16-alpine
    container_name: strathon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: strathon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strathon_dev}
      POSTGRES_DB: strathon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Note: no migrations are mounted here. The receiver runs `alembic
      # upgrade head` in its startup lifespan, so the schema is managed by
      # Alembic, not Postgres's docker-entrypoint-initdb.d. This avoids
      # the well-known footgun where init.d scripts only run on first boot
      # and silently no-op on subsequent migrations.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strathon -d strathon"]
      interval: 5s
      timeout: 5s
      retries: 5

  receiver:
    build:
      context: ./receiver
      dockerfile: Dockerfile
    container_name: strathon-receiver
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://strathon:${POSTGRES_PASSWORD:-strathon_dev}@postgres:5432/strathon
      STRATHON_LOG_LEVEL: ${STRATHON_LOG_LEVEL:-INFO}
      STRATHON_LOG_FORMAT: ${STRATHON_LOG_FORMAT:-text}
      STRATHON_AUTO_MIGRATE: ${STRATHON_AUTO_MIGRATE:-true}
      STRATHON_SAMPLING_RATE: ${STRATHON_SAMPLING_RATE:-1.0}
      STRATHON_RETENTION_ENABLED: ${STRATHON_RETENTION_ENABLED:-true}
      STRATHON_RETENTION_INTERVAL_SECONDS: ${STRATHON_RETENTION_INTERVAL_SECONDS:-3600}
      STRATHON_RETENTION_BATCH_SIZE: ${STRATHON_RETENTION_BATCH_SIZE:-5000}
    ports:
      - "4318:4318"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4318/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # The dashboard service gets added in a future commit (Next.js scaffold).
  # Once the dashboard exists, it merges with the receiver into a single
  # supervisord-managed container per the committed architecture.

volumes:
  postgres_data:
    name: strathon_postgres_data
