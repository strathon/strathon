services:
  postgres:
    image: postgres:16-alpine
    container_name: strathon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: strathon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strathon_dev}
      POSTGRES_DB: strathon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strathon -d strathon"]
      interval: 5s
      timeout: 5s
      retries: 5

  receiver:
    image: ghcr.io/strathon/receiver:latest
    build:
      context: ./receiver
      dockerfile: Dockerfile
    container_name: strathon-receiver
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://strathon:${POSTGRES_PASSWORD:-strathon_dev}@postgres:5432/strathon
      STRATHON_LOG_LEVEL: ${STRATHON_LOG_LEVEL:-INFO}
      STRATHON_LOG_FORMAT: ${STRATHON_LOG_FORMAT:-text}
      STRATHON_AUTO_MIGRATE: ${STRATHON_AUTO_MIGRATE:-true}
      STRATHON_SAMPLING_RATE: ${STRATHON_SAMPLING_RATE:-1.0}
      STRATHON_RETENTION_ENABLED: ${STRATHON_RETENTION_ENABLED:-true}
      STRATHON_RETENTION_INTERVAL_SECONDS: ${STRATHON_RETENTION_INTERVAL_SECONDS:-3600}
      STRATHON_RETENTION_BATCH_SIZE: ${STRATHON_RETENTION_BATCH_SIZE:-5000}
      STRATHON_AI_API_KEY: ${STRATHON_AI_API_KEY:-}
    ports:
      - "4318:4318"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4318/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    image: ghcr.io/strathon/dashboard:latest
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: strathon-dashboard
    restart: unless-stopped
    depends_on:
      receiver:
        condition: service_healthy
    environment:
      RECEIVER_URL: http://receiver:4318
      NODE_ENV: production
      # Set to "true" only when serving the dashboard over HTTPS (e.g. behind
      # a TLS reverse proxy). Over plain HTTP, Secure cookies are dropped by
      # the browser and login fails, so this defaults off for local self-host.
      STRATHON_COOKIE_SECURE: ${STRATHON_COOKIE_SECURE:-false}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
