# Strathon database migrations config.
#
# The database URL is intentionally NOT set here — env.py reads it from
# the DATABASE_URL environment variable so the same alembic.ini works in
# dev, CI, and production without code changes.
#
# Usage:
#   DATABASE_URL=postgresql://... alembic upgrade head
#   DATABASE_URL=postgresql://... alembic downgrade -1
#   DATABASE_URL=postgresql://... alembic current
#   DATABASE_URL=postgresql://... alembic history

[alembic]
script_location = alembic

# Migration filenames follow the existing 001_*, 002_*, ... convention.
# Alembic's file_template puts a timestamp first by default, which is great
# for autogenerate but doesn't match the convention we already established.
# We use a serial counter prefix (the four-digit revision) plus the
# message slug.
file_template = %%(rev)s_%%(slug)s

# Truncate slug to keep filenames readable
truncate_slug_length = 50

# Use a hash for revision IDs by default. We override per-revision below in
# the actual migration files to keep the 001/002/003 numbering.
revision_environment = false

# Prepend the repo root to sys.path so env.py can import from our codebase.
prepend_sys_path = .

# Output format for `alembic history` etc.
output_encoding = utf-8

# Don't truncate stdout
sourceless = false


# ---- logging ----
# Alembic uses Python logging. The receiver configures logging itself,
# so we keep this minimal here.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
