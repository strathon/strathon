name: CI

# Run on every push to any branch, every PR against main. Manual trigger
# (workflow_dispatch) available for re-runs without a code change.
on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel any in-flight runs on the same branch when a new push lands.
# Saves CI minutes and gives faster feedback on the latest commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Permissions default to read-only at the workflow level. Individual
# jobs grant additional permissions only when they need them.
permissions:
  contents: read

jobs:
  # ============================================================
  # Secret + forbidden-term scan. Stdlib-only, no deps, fast.
  # Blocks accidental credential leaks and a configurable list of
  # disallowed terms (loaded from a gitignored local file / CI secret)
  # from reaching the public repo. Mirrors the local pre-commit hook.
  # ============================================================
  secret-scan:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan tracked files for secrets and forbidden terms
        run: python scripts/check_secrets.py --all
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Bandit static security scan
        run: |
          pip install bandit
          bandit -r receiver/ sdk/src/ cli/ scripts/ \
            -x '*/tests/*,*/test_*.py' -c .bandit -q

  # ============================================================
  # SDK unit tests — matrixed across supported Python versions.
  # No Postgres dependency; the SDK does not touch a DB directly.
  # ============================================================
  sdk-tests:
    name: SDK tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: sdk/pyproject.toml

      - name: Install SDK with all framework extras
        working-directory: sdk
        run: |
          python -m pip install --upgrade pip
          # Install with all framework extras so every integration test
          # can actually exercise its framework
          pip install -e ".[all]" pytest pytest-asyncio

      - name: Run SDK tests
        working-directory: sdk
        run: pytest tests/ -v --tb=short

  # ============================================================
  # Receiver tests — needs Postgres for the retention DB tests.
  # Python 3.12 only because the receiver requires >= 3.12.
  # ============================================================
  receiver-tests:
    name: Receiver tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: strathon
          POSTGRES_PASSWORD: strathon_dev
          POSTGRES_DB: strathon
        ports:
          - 5432:5432
        # pg_isready health-checks the container; the job won't start
        # this step's container until it reports healthy.
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: receiver/pyproject.toml

      - name: Install receiver dependencies
        working-directory: receiver
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Apply database migrations
        working-directory: receiver
        env:
          DATABASE_URL: postgresql://strathon:strathon_dev@127.0.0.1:5432/strathon
        run: alembic upgrade head

      - name: Run receiver tests
        working-directory: receiver
        env:
          DATABASE_URL: postgresql://strathon:strathon_dev@127.0.0.1:5432/strathon
        run: pytest tests/ -v --tb=short

  # ============================================================
  # Cross-framework parity integration tests — boots a real receiver
  # subprocess and exercises LangGraph/CrewAI/OAI Agents against it.
  # ============================================================
  integration-tests:
    name: Cross-framework parity
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: strathon
          POSTGRES_PASSWORD: strathon_dev
          POSTGRES_DB: strathon
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install all components
        run: |
          python -m pip install --upgrade pip
          # SDK with all framework extras so the parity test can drive
          # LangGraph, CrewAI, and OpenAI Agents SDK
          pip install -e "./sdk[all]"
          # Receiver so the integration conftest can launch it as a subprocess
          pip install -e "./receiver"
          # Plus the integration test's direct dependency
          pip install psycopg pytest pytest-asyncio

      - name: Apply database migrations
        working-directory: receiver
        env:
          DATABASE_URL: postgresql://strathon:strathon_dev@127.0.0.1:5432/strathon
        run: alembic upgrade head

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://strathon:strathon_dev@127.0.0.1:5432/strathon
        run: pytest tests/ -v --tb=short

  # ============================================================
  # Docker build verification — proves the receiver image actually
  # builds. Catches Dockerfile regressions before they hit users on
  # quickstart. We don't push the image anywhere yet (no registry
  # process); that lands with the release pipeline.
  # ============================================================
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build receiver image
        uses: docker/build-push-action@v6
        with:
          context: ./receiver
          push: false
          load: true
          tags: strathon-receiver:ci
          # Layer cache stored in the GitHub Actions cache for fast rebuilds
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image can start
        run: |
          # Sanity-check that the entrypoint resolves and python imports work.
          # We can't actually serve here (no Postgres in this job), so just
          # confirm the container starts and main.py imports cleanly.
          docker run --rm --entrypoint python strathon-receiver:ci \
            -c "import main; print('receiver module imports OK')"

  # ============================================================
  # Lint — fast, runs in parallel with everything. Catches obvious
  # style / unused-import issues before review.
  # ============================================================
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check .

  # ============================================================
  # CEL attribute drift — fails if any doc example or policy template
  # references a CEL attribute the engine never emits. A policy using a
  # non-emitted attribute silently never matches, the same false-confidence
  # failure class as silent enforcement gaps. Stdlib-only, no deps, fast.
  # ============================================================
  cel-attributes:
    name: CEL attribute drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check referenced CEL attributes are all emitted
        run: python scripts/check_cel_attributes.py

  # ============================================================
  # SDK type check — BLOCKING. The SDK passes mypy clean: a scoped
  # [tool.mypy] config in sdk/pyproject.toml ignores optional-framework
  # missing imports and the intentional method-assign monkey-patching in the
  # instrumentation adapters; everything else must type-check. Two real bugs
  # were found and fixed while making this clean (a non-existent pydantic-ai
  # enum member, and a google-adk callback signature mismatch), which is why
  # it is worth gating on.
  typecheck-sdk:
    name: Type check — SDK (blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install SDK with dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e "./sdk[all,dev]"
      - name: mypy (SDK)
        working-directory: sdk
        run: mypy src/strathon/

  # Receiver type check — BLOCKING. The receiver passes mypy clean after a
  # triage pass that fixed the real issues (the heartbeat_missed and
  # sdk_integrity_violation alerts both passed a null project_id/session and so
  # never dispatched; several reused-variable and Optional-narrowing bugs) and
  # scoped only the genuine framework false positives (re2 missing stubs, async
  # CursorResult.rowcount, mitmproxy follow-imports) in receiver/pyproject.toml.
  typecheck-receiver:
    name: Type check — receiver
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install receiver with dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e "./receiver[dev]"
      - name: mypy (receiver)
        working-directory: receiver
        run: mypy .

  # ============================================================
  # Docker — build and push to ghcr.io on version tags (v*)
  # ============================================================
  docker:
    name: Docker image
    needs: [receiver-tests, lint]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      packages: write
      contents: read
    strategy:
      matrix:
        image:
          - { name: receiver, context: ./receiver }
          - { name: dashboard, context: ./dashboard }
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          push: true
          tags: |
            ghcr.io/strathon/${{ matrix.image.name }}:latest
            ghcr.io/strathon/${{ matrix.image.name }}:${{ github.ref_name }}
